name: Generate Profile Assets

on:
  schedule:
    # every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=${{ github.repository_owner }}&theme=kimbie_dark&column=-1&margin-w=6&margin-h=6"
          path: github-profile-trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare assets for deploy
        run: |
          mkdir -p assets
          cp dist/* assets/
          cp github-profile-trophy.svg assets/github-profile-trophy.svg

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&title_color=62c1ec&text_color=62c1ec&icon_color=62c1ec&border_color=62c1ec&theme=chartreuse-dark&show=discussions_answered,prs_merged,reviews
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&title_color=62c1ec&text_color=62c1ec&border_color=62c1ec&theme=chartreuse-dark
          path: assets/github-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate generated stats cards
        run: |
          for file in assets/github-stats.svg assets/github-top-langs.svg; do
            if grep -q "Something went wrong" "$file"; then
              echo "Error card detected in $file"
              exit 1
            fi
          done

      - name: Push assets to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: assets
          commit_message: Update profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
